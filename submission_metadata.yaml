ai_usage_summary: |
  Used Claude  for architecture discussion,
  implementation, iterative code review, and debugging. The team directed all
  design decisions, parameter tuning, validation, and analysis. No candidate
  data is sent to any LLM during ranking (i really wanted to add llm layer that 
  atleast examine the top 20 and it would have been so much but the rules restricted that)
  the ranking step is fully offline and uses only local models (a sentence-transformers
  bi-encoder and a cross-encoder).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A recall->precision funnel that stays inside the offline / CPU / 5-minute budget.
  Recall: every candidate and the JD are embedded with all-MiniLM-L6-v2; cosine
  similarity captures semantic fit even for candidates who don't use the JD's
  keywords (if i am sure ,which i definitely am). Rule features add an evidence-weighted skill score that corroborates
  each claimed skill against its tenure, endorsements, and platform assessment —
  neutralising the keyword-stuffer traps.. plus experience, location, notice, and
  behavioural / availability signals. These combine in a three-part score: an
  additive relevance core (no single weak factor can veto a strong candidate),
  bounded soft modifiers, and hard gates that zero out honeypots (impossible
  date/skill math) and the JD's explicit disqualifiers (consulting-only,
  vision/speech-only, recent-AI-only, title-chasers, hands-off architects,
  pure-research, framework-enthusiasts). Unresponsive candidates are harshly
  down-weighted, per the JD's availability emphasis. Precision: the top-400
  shortlist is reranked by a local CPU cross-encoder (ms-marco-MiniLM-L-12-v2)
  that reads JD and candidate jointly, blended 50/50 with the rule score.
  Per-candidate reasoning is generated from real profile facts. Ranking runs in
  ~40s offline; embedding plus model download are a separate precompute step.

